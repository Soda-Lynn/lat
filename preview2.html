<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Your Fodbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #2d1b2d; 
            margin: 0; 
            overflow: hidden; 
            color: #ede4d6;
        }

        #interactive-grid { 
            position: fixed; top: 0; left: 0; width: 200vw; height: 200vh; 
            background-image: radial-gradient(circle at 2px 2px, rgba(237, 228, 214, 0.1) 2px, transparent 0); 
            background-size: 40px 40px; 
            pointer-events: none; z-index: 0;
        }

        .box-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 100px auto;
            perspective: 1000px;
            z-index: 10;
        }

        /* Simplified Box Visual for Preview */
        .preview-box {
            width: 100%;
            height: 100%;
            background: var(--box-color, #ff4d4d);
            border: 4px solid #000;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 10px;
            justify-content: center;
            align-content: center;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.3);
        }

        .item-icon { width: 50px; height: 50px; object-fit: contain; }

        .message-card {
            background: #ede4d6;
            color: #2d1b2d;
            padding: 2rem;
            border-radius: 8px;
            border: 3px solid #000;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 10px 10px 0px #000;
        }

        .btn-action {
            background: #ede4d6;
            color: #2d1b2d;
            padding: 10px 20px;
            border: 2px solid #000;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-action:hover { transform: translate(-4px, -4px); box-shadow: 4px 4px 0 #000; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div id="interactive-grid"></div>

    <div id="capture-area" class="text-center">
        <h1 class="text-3xl font-black mb-8 uppercase tracking-tighter">A Gift for <span id="display-to">...</span></h1>
        
        <div class="box-container">
            <div id="box-visual" class="preview-box">
                </div>
        </div>

        <div class="message-card text-left">
            <p class="text-xs uppercase font-bold opacity-50">Message:</p>
            <p id="display-msg" class="text-lg my-4 italic">"Loading your message..."</p>
            <p class="text-right font-bold">— <span id="display-from">...</span></p>
        </div>
    </div>

    <div class="flex gap-4 mt-8">
        <button onclick="copyLink()" class="btn-action">COPY LINK</button>
        <button onclick="downloadImage()" class="btn-action">SAVE IMAGE</button>
    </div>

    <script>
        function initPreview() {
            const params = new URLSearchParams(window.location.search);
            
            // Get data from URL
            const items = params.get('i') ? params.get('i').split(',') : [];
            const color = params.get('c') || '#ff4d4d';
            const to = params.get('to') || 'You';
            const msg = params.get('m') || 'No message provided.';
            const from = params.get('fr') || 'Anonymous';

            // Apply to UI
            document.getElementById('display-to').textContent = decodeURIComponent(to);
            document.getElementById('display-msg').textContent = `"${decodeURIComponent(msg)}"`;
            document.getElementById('display-from').textContent = decodeURIComponent(from);
            
            const box = document.getElementById('box-visual');
            box.style.setProperty('--box-color', decodeURIComponent(color));

            // Inject Items
            items.forEach(itemId => {
                if(itemId) {
                    const img = document.createElement('img');
                    img.src = `${itemId}.svg`;
                    img.className = 'item-icon';
                    box.appendChild(img);
                }
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }

        function downloadImage() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { backgroundColor: '#2d1b2d' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-fodbox.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        window.onload = initPreview;
    </script>
</body>
</html>
